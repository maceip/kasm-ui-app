<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#2c3e50" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kasm" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon-512.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- SEO / Social -->
    <meta name="description" content="Kasm UI - A bleeding-edge React desktop environment with docking, collaborative editing, virtual filesystem, and window management." />
    <meta name="application-name" content="Kasm UI" />

    <title>Kasm UI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              console.log('[SW] Registered:', reg.scope);
              // Check for updates periodically
              setInterval(() => reg.update(), 60 * 60 * 1000);
            })
            .catch(err => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
