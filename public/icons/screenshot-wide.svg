<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0a0a1a"/>
  <!-- Desktop gradient -->
  <ellipse cx="250" cy="360" rx="400" ry="300" fill="rgba(108,92,231,0.06)"/>
  <ellipse cx="1000" cy="200" rx="350" ry="250" fill="rgba(0,180,216,0.04)"/>
  <!-- Window 1 -->
  <rect x="80" y="40" width="500" height="400" rx="8" fill="#1e1e2e" stroke="#333355"/>
  <rect x="80" y="40" width="500" height="36" rx="8" fill="#16162a"/>
  <text x="100" y="64" fill="#e0e0e0" font-size="12" font-family="system-ui">Terminal</text>
  <rect x="90" y="90" width="480" height="340" fill="#0a0a1a"/>
  <text x="100" y="115" fill="#2ecc71" font-size="11" font-family="monospace">kasm-user@desktop:~$</text>
  <!-- Window 2 -->
  <rect x="400" y="120" width="600" height="450" rx="8" fill="#1e1e2e" stroke="#6c5ce7" stroke-width="1.5"/>
  <rect x="400" y="120" width="600" height="36" rx="8" fill="#1a1a3e"/>
  <text x="420" y="144" fill="#e0e0e0" font-size="12" font-family="system-ui">File Manager</text>
  <!-- Panel -->
  <rect x="0" y="672" width="1280" height="48" fill="#1a1a2e"/>
  <rect x="4" y="678" width="60" height="36" rx="6" fill="rgba(255,255,255,0.08)"/>
  <text x="18" y="702" fill="#e0e0e0" font-size="12" font-family="system-ui">Apps</text>
  <!-- Kasm logo -->
  <g transform="translate(640,580)">
    <polygon points="0,-30 26,0 0,30 -26,0" fill="#6c5ce7" opacity="0.3"/>
  </g>
</svg>
