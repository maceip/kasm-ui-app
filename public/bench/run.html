<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kasm Bench – Runner</title>
  <style>
    :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; }
    #bar {
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
      padding: 0.5rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    #bar .label { font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    #bar .label.react { color: #61dafb; }
    #bar .label.solid { color: var(--green); }
    #status { color: var(--muted); flex: 1; min-width: 200px; }
    #progress { width: 120px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    #progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; }
    #cache-badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 999px; font-weight: 700;
    }
    .cache-cold { background: var(--green); color: #000; }
    .cache-warm { background: #d29922; color: #000; }
    .cache-unknown { background: var(--muted); color: #000; }
    iframe { width: 100%; height: calc(100vh - 42px); border: none; }
  </style>
</head>
<body>

<div id="bar">
  <span id="fw-label" class="label">...</span>
  <span id="cache-badge" class="cache-unknown">CACHE: ?</span>
  <span id="status">Initializing...</span>
  <div id="progress"><div id="progress-fill"></div></div>
</div>
<iframe id="app-frame"></iframe>

<script>
// -------------------------------------------------------
// Kasm Benchmark Runner v3
//
// - Nukes SW + Cache API before load for true cold start
// - Detects whether the load actually hit cache or network
// - Launches apps by name via the real app menu UI
// - Opens 15+ windows to stress the window manager
// - Tests: drag, resize, snap, focus cycling, minimize/restore,
//   maximize/tile, split pane, tab reorder, expo, scale,
//   and batch close
// -------------------------------------------------------
const params = new URLSearchParams(location.search);
const fw = params.get('fw');
const returnTo = params.get('return') || 'index.html';

const frame = document.getElementById('app-frame');
const statusEl = document.getElementById('status');
const fwLabel = document.getElementById('fw-label');
const progressFill = document.getElementById('progress-fill');
const cacheBadge = document.getElementById('cache-badge');

if (!fw || !['react', 'solid'].includes(fw)) {
  statusEl.textContent = 'Error: ?fw=react or ?fw=solid required';
} else {
  fwLabel.textContent = fw === 'react' ? 'React' : 'SolidJS';
  fwLabel.classList.add(fw);
  prepareThenRun();
}

function setProgress(pct) { progressFill.style.width = pct + '%'; }
function setStatus(msg) { statusEl.textContent = msg; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// -------------------------------------------------------
// Cache nuking
// -------------------------------------------------------
async function nukeCache() {
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));
  }
  if ('caches' in window) {
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
  }
}

async function prepareThenRun() {
  setStatus('Nuking service workers & cache...');
  await nukeCache();
  await sleep(300);
  await startBenchmark();
}

// -------------------------------------------------------
// Helpers
// -------------------------------------------------------
function waitForLoad(iframe) {
  return new Promise(resolve => {
    const check = () => {
      try {
        if (iframe.contentDocument?.readyState === 'complete') return resolve();
      } catch(e) {}
      setTimeout(check, 50);
    };
    check();
  });
}

async function measureInteraction(iframe, actionFn) {
  const w = iframe.contentWindow;
  const t0 = w.performance.now();
  actionFn(w, w.document);
  await new Promise(r => w.requestAnimationFrame(() => w.requestAnimationFrame(r)));
  return w.performance.now() - t0;
}

// Find an element by selector, or by matching .kasm-app-menu__app-name text
function findAppByName(doc, name) {
  for (const el of doc.querySelectorAll('.kasm-app-menu__app-name')) {
    if (el.textContent.trim() === name) return el.closest('.kasm-app-menu__app');
  }
  return null;
}

// Open the app menu, find an app by its exact name, click it, return timing
async function launchApp(name) {
  const d = frame.contentWindow.document;
  const w = frame.contentWindow;

  // Open menu if closed
  const menu = d.querySelector('.kasm-app-menu');
  if (!menu || menu.offsetParent === null || getComputedStyle(menu).display === 'none') {
    const menuBtn = d.querySelector('.kasm-app-menu-btn');
    if (menuBtn) {
      menuBtn.dispatchEvent(new w.MouseEvent('click', { bubbles: true, cancelable: true }));
      await sleep(250);
    }
  }

  // Click "All" category to see every app
  const cats = d.querySelectorAll('.kasm-app-menu__category');
  if (cats.length > 0) {
    cats[0].dispatchEvent(new w.MouseEvent('click', { bubbles: true, cancelable: true }));
    await sleep(150);
  }

  // Find and click the app
  const appEl = findAppByName(d, name);
  if (!appEl) return null;

  const t0 = w.performance.now();
  appEl.dispatchEvent(new w.MouseEvent('click', { bubbles: true, cancelable: true }));
  await new Promise(r => w.requestAnimationFrame(() => w.requestAnimationFrame(r)));
  const elapsed = w.performance.now() - t0;
  await sleep(200);
  return elapsed;
}

// Continuous mouse drag
async function dragAndMeasure(iframe, el, dx, dy, steps) {
  const w = iframe.contentWindow;
  if (!el) return null;
  const rect = el.getBoundingClientRect();
  const sx = rect.left + rect.width / 2;
  const sy = rect.top + rect.height / 2;
  const times = [];

  el.dispatchEvent(new w.MouseEvent('mousedown', { clientX: sx, clientY: sy, bubbles: true }));
  for (let i = 1; i <= steps; i++) {
    const t0 = w.performance.now();
    w.document.dispatchEvent(new w.MouseEvent('mousemove', {
      clientX: sx + (dx * i / steps), clientY: sy + (dy * i / steps), bubbles: true
    }));
    await new Promise(r => w.requestAnimationFrame(r));
    times.push(w.performance.now() - t0);
  }
  w.document.dispatchEvent(new w.MouseEvent('mouseup', {
    clientX: sx + dx, clientY: sy + dy, bubbles: true
  }));
  return times.length ? times.reduce((a,b) => a+b, 0) / times.length : null;
}

function getLoadMetrics(iframe) {
  const perf = iframe.contentWindow.performance;
  const nav = perf.getEntriesByType('navigation')[0] || {};
  const paints = {};
  for (const e of perf.getEntriesByType('paint')) paints[e.name] = e.startTime;
  return {
    domInteractive: nav.domInteractive - nav.startTime,
    domContentLoaded: nav.domContentLoadedEventEnd - nav.startTime,
    firstPaint: paints['first-paint'] || null,
    firstContentfulPaint: paints['first-contentful-paint'] || null,
    fullLoad: nav.loadEventEnd - nav.startTime,
    transferSize: nav.transferSize || null,
  };
}

function getMemory(iframe) {
  try {
    const m = iframe.contentWindow.performance?.memory;
    if (m) return { usedMB: +(m.usedJSHeapSize / 1048576).toFixed(2) };
  } catch(e) {}
  return null;
}

// Detect if the main document was served from cache
function detectCacheStatus(iframe) {
  try {
    const perf = iframe.contentWindow.performance;
    const nav = perf.getEntriesByType('navigation')[0];
    if (!nav) return 'unknown';
    // transferSize === 0 means served from cache (SW or HTTP)
    if (nav.transferSize === 0) return 'warm';
    // Also check if any resources were served from cache
    const resources = perf.getEntriesByType('resource');
    const total = resources.length;
    const cached = resources.filter(r => r.transferSize === 0).length;
    return { label: 'cold', total, cached, network: total - cached };
  } catch(e) { return 'unknown'; }
}

// -------------------------------------------------------
// MAIN BENCHMARK
// -------------------------------------------------------
async function startBenchmark() {
  const results = {};
  const cacheInfo = {};

  const cacheBust = '?_cb=' + Date.now() + '&_r=' + Math.random().toString(36).slice(2);
  const appUrl = (fw === 'react' ? 'react/index.html' : 'solid/index.html') + cacheBust;

  // ==== PHASE 1: COLD LOAD ====
  const loadStart = performance.now();
  setStatus('Loading app (cache-busted)...');
  setProgress(3);
  frame.src = appUrl;

  await waitForLoad(frame);
  const loadEnd = performance.now();
  results['Cold Load (wall clock)'] = +(loadEnd - loadStart).toFixed(2);

  const load = getLoadMetrics(frame);
  results['DOM Interactive'] = +load.domInteractive.toFixed(2);
  results['DOM Content Loaded'] = +load.domContentLoaded.toFixed(2);
  if (load.firstPaint != null) results['First Paint'] = +load.firstPaint.toFixed(2);
  if (load.firstContentfulPaint != null) results['First Contentful Paint'] = +load.firstContentfulPaint.toFixed(2);
  results['Full Load'] = +load.fullLoad.toFixed(2);
  if (load.transferSize != null) results['Transfer Size (KB)'] = +(load.transferSize / 1024).toFixed(1);

  // Cache detection
  const cacheStatus = detectCacheStatus(frame);
  if (typeof cacheStatus === 'object') {
    cacheInfo.resources_total = cacheStatus.total;
    cacheInfo.resources_cached = cacheStatus.cached;
    cacheInfo.resources_network = cacheStatus.network;
    const pct = cacheStatus.total ? Math.round(cacheStatus.cached / cacheStatus.total * 100) : 0;
    cacheBadge.textContent = `${pct}% cached (${cacheStatus.cached}/${cacheStatus.total})`;
    cacheBadge.className = pct > 50 ? 'cache-warm' : 'cache-cold';
    results['Resources from Cache'] = cacheStatus.cached;
    results['Resources from Network'] = cacheStatus.network;
  } else {
    cacheBadge.textContent = cacheStatus === 'warm' ? 'CACHED' : 'COLD';
    cacheBadge.className = cacheStatus === 'warm' ? 'cache-warm' : 'cache-cold';
  }

  const mem0 = getMemory(frame);
  if (mem0) results['JS Heap Baseline (MB)'] = mem0.usedMB;

  setProgress(8);
  setStatus('Settling...');
  await sleep(2000);

  const doc = () => frame.contentWindow.document;
  const win = () => frame.contentWindow;

  // ==== PHASE 2: LAUNCH TERMINAL & INTERACT ====
  setStatus('Launching Terminal...');
  const tTerminal = await launchApp('Terminal');
  if (tTerminal != null) results['Launch Terminal'] = +tTerminal.toFixed(2);
  await sleep(400);
  setProgress(12);

  // Maximize the terminal window
  setStatus('Maximizing Terminal...');
  {
    const maxBtn = doc().querySelector('.kasm-titlebar__btn--maximize');
    if (maxBtn) {
      const t = await measureInteraction(frame, (w) => {
        maxBtn.dispatchEvent(new w.MouseEvent('click', { bubbles: true, cancelable: true }));
      });
      results['Maximize Window'] = +t.toFixed(2);
    }
  }
  await sleep(300);

  // Restore from maximize
  {
    const maxBtn = doc().querySelector('.kasm-titlebar__btn--maximize');
    if (maxBtn) {
      const t = await measureInteraction(frame, (w) => {
        maxBtn.dispatchEvent(new w.MouseEvent('click', { bubbles: true, cancelable: true }));
      });
      results['Restore from Maximize'] = +t.toFixed(2);
    }
  }
  await sleep(200);
  setProgress(15);

  // ==== PHASE 3: WINDOW DRAG (60 frames) ====
  setStatus('Dragging window (60 frames)...');
  {
    const tb = doc().querySelector('.kasm-titlebar');
    const t = await dragAndMeasure(frame, tb, 300, 150, 60);
    if (t != null) results['Window Drag (avg/frame)'] = +t.toFixed(2);
  }
  await sleep(200);
  setProgress(20);

  // ==== PHASE 4: WINDOW RESIZE (60 frames via SE handle) ====
  setStatus('Resizing window SE corner (60 frames)...');
  {
    const handle = doc().querySelector('.kasm-window__resize--se');
    const t = await dragAndMeasure(frame, handle, 200, 150, 60);
    if (t != null) results['Window Resize SE (avg/frame)'] = +t.toFixed(2);
  }
  await sleep(200);
  setProgress(25);

  // ==== PHASE 5: SNAP TO LEFT EDGE ====
  setStatus('Snap window to left edge...');
  {
    const tb = doc().querySelector('.kasm-titlebar');
    if (tb) {
      const rect = tb.getBoundingClientRect();
      const sx = rect.left + rect.width / 2, sy = rect.top + rect.height / 2;
      const targetX = 2;
      const steps = 40;
      const ddx = targetX - sx;
      const w = win();
      const times = [];

      tb.dispatchEvent(new w.MouseEvent('mousedown', { clientX: sx, clientY: sy, bubbles: true }));
      for (let i = 1; i <= steps; i++) {
        const t0 = w.performance.now();
        w.document.dispatchEvent(new w.MouseEvent('mousemove', {
          clientX: sx + (ddx * i / steps), clientY: sy, bubbles: true
        }));
        await new Promise(r => w.requestAnimationFrame(r));
        times.push(w.performance.now() - t0);
      }
      const snapT0 = w.performance.now();
      w.document.dispatchEvent(new w.MouseEvent('mouseup', { clientX: targetX, clientY: sy, bubbles: true }));
      await new Promise(r => w.requestAnimationFrame(() => w.requestAnimationFrame(r)));
      const snapTime = w.performance.now() - snapT0;

      if (times.length) results['Snap Drag to Edge (avg/frame)'] = +(times.reduce((a,b)=>a+b,0)/times.length).toFixed(2);
      results['Snap Commit'] = +snapTime.toFixed(2);
    }
  }
  await sleep(400);

  // Restore via double-click
  {
    const tb = doc().querySelector('.kasm-titlebar');
    if (tb) {
      const t = await measureInteraction(frame, (w) => {
        tb.dispatchEvent(new w.MouseEvent('dblclick', { bubbles: true }));
      });
      results['Snap Restore (dblclick)'] = +t.toFixed(2);
      await sleep(200);
      // Toggle back to floating
      await measureInteraction(frame, (w) => {
        tb.dispatchEvent(new w.MouseEvent('dblclick', { bubbles: true }));
      });
    }
  }
  await sleep(200);
  setProgress(30);

  // ==== PHASE 6: MASS WINDOW CREATION (15 windows) ====
  // Launch a mix of different apps to create 15 windows total.
  // This is the core stress test: each new window means the
  // window manager must track, z-order, and render more DOM.
  setStatus('Opening 15 windows...');
  const appNames = [
    'Calculator', 'File Manager', 'Text Editor', 'Notes', 'System Monitor',
    'Docking Demo', 'Codex', 'Claude Code', 'GitHub', 'GitLab',
    'Gemini Code', 'Cursor Agent', 'Devin', 'Junie',
  ];
  const launchTimes = [];
  for (let i = 0; i < appNames.length; i++) {
    setStatus(`Opening ${appNames[i]} (${i + 2}/15)...`);
    const t = await launchApp(appNames[i]);
    if (t != null) launchTimes.push(t);
    setProgress(30 + Math.round((i / appNames.length) * 15));
  }
  if (launchTimes.length) {
    results['App Launch (avg, 15 wins)'] = +(launchTimes.reduce((a,b)=>a+b,0)/launchTimes.length).toFixed(2);
    results['App Launch (last of 15)'] = +launchTimes[launchTimes.length - 1].toFixed(2);
  }

  const mem1 = getMemory(frame);
  if (mem1) results['JS Heap (15 windows, MB)'] = mem1.usedMB;
  setProgress(45);

  // ==== PHASE 7: RAPID FOCUS CYCLING (15 windows x 2 rounds) ====
  setStatus('Focus cycling across 15 windows...');
  {
    const allWins = doc().querySelectorAll('.kasm-window');
    const focusTimes = [];
    for (let round = 0; round < 2; round++) {
      for (const wEl of allWins) {
        const tb = wEl.querySelector('.kasm-titlebar');
        if (!tb) continue;
        const t = await measureInteraction(frame, (w) => {
          tb.dispatchEvent(new w.MouseEvent('mousedown', { bubbles: true }));
          tb.dispatchEvent(new w.MouseEvent('mouseup', { bubbles: true }));
        });
        focusTimes.push(t);
      }
    }
    if (focusTimes.length) results['Focus Switch (avg, 15 wins)'] = +(focusTimes.reduce((a,b)=>a+b,0)/focusTimes.length).toFixed(2);
  }
  setProgress(52);

  // ==== PHASE 8: DRAG A WINDOW WITH 14 OTHERS BEHIND IT ====
  setStatus('Dragging window over 14 others (80 frames)...');
  {
    const tb = doc().querySelector('.kasm-window--focused .kasm-titlebar');
    const t = await dragAndMeasure(frame, tb, 400, 200, 80);
    if (t != null) results['Drag over 14 windows (avg/frame)'] = +t.toFixed(2);
  }
  await sleep(200);
  setProgress(57);

  // ==== PHASE 9: RESIZE WITH 14 WINDOWS BEHIND ====
  setStatus('Resizing window with 14 behind (60 frames)...');
  {
    const handle = doc().querySelector('.kasm-window--focused .kasm-window__resize--se');
    const t = await dragAndMeasure(frame, handle, 150, 100, 60);
    if (t != null) results['Resize over 14 windows (avg/frame)'] = +t.toFixed(2);
  }
  await sleep(200);
  setProgress(62);

  // ==== PHASE 10: MINIMIZE ALL 15 WINDOWS ====
  setStatus('Minimizing all 15 windows...');
  {
    const minTimes = [];
    let btn;
    while ((btn = doc().querySelector('.kasm-titlebar__btn--minimize'))) {
      const t = await measureInteraction(frame, (w) => {
        btn.dispatchEvent(new w.MouseEvent('click', { bubbles: true, cancelable: true }));
      });
      minTimes.push(t);
      await sleep(50);
    }
    if (minTimes.length) {
      results['Minimize (avg, 15 wins)'] = +(minTimes.reduce((a,b)=>a+b,0)/minTimes.length).toFixed(2);
      results['Minimize (last of 15)'] = +minTimes[minTimes.length - 1].toFixed(2);
    }
  }
  setProgress(68);

  // ==== PHASE 11: RESTORE ALL FROM PANEL ====
  setStatus('Restoring all from panel...');
  {
    const restoreTimes = [];
    // Panel buttons in center zone are window list buttons
    const panelBtns = doc().querySelectorAll('.kasm-panel__zone--center .kasm-panel-btn');
    for (const btn of panelBtns) {
      const t = await measureInteraction(frame, (w) => {
        btn.dispatchEvent(new w.MouseEvent('click', { bubbles: true, cancelable: true }));
      });
      restoreTimes.push(t);
      await sleep(50);
    }
    if (restoreTimes.length) results['Restore from Panel (avg, 15 wins)'] = +(restoreTimes.reduce((a,b)=>a+b,0)/restoreTimes.length).toFixed(2);
  }
  await sleep(300);
  setProgress(73);

  // ==== PHASE 12: EXPO VIEW (with 15 windows) ====
  setStatus('Expo view with 15 windows...');
  {
    const tOpen = await measureInteraction(frame, (w) => {
      w.dispatchEvent(new w.KeyboardEvent('keydown', {
        key: 'ArrowUp', code: 'ArrowUp', ctrlKey: true, altKey: true, bubbles: true
      }));
    });
    results['Expo Open (15 wins)'] = +tOpen.toFixed(2);
    await sleep(600);

    const tClose = await measureInteraction(frame, (w) => {
      w.dispatchEvent(new w.KeyboardEvent('keydown', {
        key: 'Escape', code: 'Escape', bubbles: true
      }));
    });
    results['Expo Close (15 wins)'] = +tClose.toFixed(2);
  }
  await sleep(300);

  // Scale view
  {
    const tOpen = await measureInteraction(frame, (w) => {
      w.dispatchEvent(new w.KeyboardEvent('keydown', {
        key: 'ArrowDown', code: 'ArrowDown', ctrlKey: true, altKey: true, bubbles: true
      }));
    });
    results['Scale Open (15 wins)'] = +tOpen.toFixed(2);
    await sleep(600);

    const tClose = await measureInteraction(frame, (w) => {
      w.dispatchEvent(new w.KeyboardEvent('keydown', {
        key: 'Escape', code: 'Escape', bubbles: true
      }));
    });
    results['Scale Close (15 wins)'] = +tClose.toFixed(2);
  }
  await sleep(300);
  setProgress(78);

  // ==== PHASE 13: SPLIT PANE RESIZE ====
  setStatus('Split pane resize (50 frames)...');
  {
    const splitter = doc().querySelector('.kasm-split-pane__splitter');
    const t = await dragAndMeasure(frame, splitter, 150, 0, 50);
    if (t != null) results['Split Pane Resize (avg/frame)'] = +t.toFixed(2);
  }
  await sleep(200);
  setProgress(82);

  // ==== PHASE 14: TAB REORDER ====
  setStatus('Tab reorder DnD...');
  {
    const tabs = doc().querySelectorAll('.kasm-tab-panel__tab');
    if (tabs.length >= 2) {
      const src = tabs[0], dest = tabs[tabs.length - 1];
      const w = win();
      const srcR = src.getBoundingClientRect(), destR = dest.getBoundingClientRect();

      const data = {};
      const dt = {
        types: [], dropEffect: 'none', effectAllowed: 'move',
        setData(k, v) { data[k] = v; this.types.push(k); },
        getData(k) { return data[k] || ''; },
        setDragImage() {},
      };

      const t0 = w.performance.now();
      src.dispatchEvent(new w.DragEvent('dragstart', {
        clientX: srcR.left + srcR.width/2, clientY: srcR.top + srcR.height/2,
        bubbles: true, dataTransfer: dt,
      }));
      dest.dispatchEvent(new w.DragEvent('dragenter', {
        clientX: destR.left + destR.width/2, clientY: destR.top + destR.height/2,
        bubbles: true, dataTransfer: dt,
      }));
      dest.dispatchEvent(new w.DragEvent('dragover', {
        clientX: destR.left + destR.width/2, clientY: destR.top + destR.height/2,
        bubbles: true, cancelable: true, dataTransfer: dt,
      }));
      dest.dispatchEvent(new w.DragEvent('drop', {
        clientX: destR.left + destR.width/2, clientY: destR.top + destR.height/2,
        bubbles: true, dataTransfer: dt,
      }));
      src.dispatchEvent(new w.DragEvent('dragend', { bubbles: true, dataTransfer: dt }));
      await new Promise(r => w.requestAnimationFrame(() => w.requestAnimationFrame(r)));
      results['Tab Reorder DnD'] = +(w.performance.now() - t0).toFixed(2);
    }
  }
  await sleep(200);
  setProgress(86);

  // ==== PHASE 15: CLOSE ALL 15 WINDOWS ====
  setStatus('Closing all 15 windows...');
  {
    const closeTimes = [];
    let btn;
    while ((btn = doc().querySelector('.kasm-titlebar__btn--close'))) {
      const t = await measureInteraction(frame, (w) => {
        btn.dispatchEvent(new w.MouseEvent('click', { bubbles: true, cancelable: true }));
      });
      closeTimes.push(t);
      await sleep(50);
    }
    if (closeTimes.length) {
      results['Close Window (avg, 15 wins)'] = +(closeTimes.reduce((a,b)=>a+b,0)/closeTimes.length).toFixed(2);
      results['Close Window (last of 15)'] = +closeTimes[closeTimes.length - 1].toFixed(2);
    }
  }
  setProgress(95);

  // ==== PHASE 16: FINAL MEMORY ====
  const memFinal = getMemory(frame);
  if (memFinal) results['JS Heap After Cleanup (MB)'] = memFinal.usedMB;

  // ==== STORE & REDIRECT ====
  localStorage.setItem('bench_' + fw, JSON.stringify({
    framework: fw,
    timestamp: Date.now(),
    userAgent: navigator.userAgent,
    cacheInfo,
    results,
  }));

  setProgress(100);
  setStatus('Done! Redirecting...');
  await sleep(500);
  location.href = returnTo;
}
</script>

</body>
</html>
